name: Deploy to Alibaba Cloud

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ── 1. 测试 ────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install & test backend
        run: |
          pip install -r backend/requirements.txt
          cd backend && python -m pytest tests/ -v --tb=short || true

  # ── 2. 构建并推送 Docker 镜像 ──────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/heyiyun-backend:latest
            ${{ env.IMAGE_PREFIX }}/heyiyun-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/heyiyun-backend:latest
          cache-to: type=inline

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/heyiyun-frontend:latest
            ${{ env.IMAGE_PREFIX }}/heyiyun-frontend:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/heyiyun-frontend:latest
          cache-to: type=inline

  # ── 3. 部署到阿里云 ────────────────────────────────────
  deploy:
    name: Deploy to Aliyun
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - uses: actions/checkout@v4

      # 先把配置文件传到服务器
      - name: Copy config files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          source: "docker-compose.prod.yml,infra/,scripts/"
          target: /opt/heyiyun/

      # 写入 .env 并启动服务
      - name: Start / update services
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          script: |
            set -e
            cd /opt/heyiyun

            # 登录 GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 生产环境变量
            cat > .env << 'ENV_EOF'
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            POSTGRES_DB=power_engineering_erp
            POSTGRES_USER=erp_user
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            REDIS_HOST=redis
            MINIO_ROOT_USER=minio_admin
            MINIO_ROOT_PASSWORD=${{ secrets.MINIO_PASSWORD }}
            BACKEND_CORS_ORIGINS=http://${{ secrets.ALIYUN_HOST }},https://${{ secrets.DOMAIN }}
            BACKEND_IMAGE=${{ env.IMAGE_PREFIX }}/heyiyun-backend:${{ github.sha }}
            FRONTEND_IMAGE=${{ env.IMAGE_PREFIX }}/heyiyun-frontend:${{ github.sha }}
            ENV_EOF

            # 拉取镜像并滚动更新
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # 清理旧镜像
            docker image prune -f

            echo "✅ Deployed commit: ${{ github.sha }}"
