<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · 和易云电力工程ERP</title>
<link rel="stylesheet" href="css/erp.css">
<style>
    body{background:linear-gradient(125deg,#0a1733 0%,#11317a 48%,#1b5fe3 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;overflow:hidden;position:relative}
    body::before{content:"";position:fixed;inset:0;background:
        radial-gradient(circle at 82% 18%,rgba(20,184,212,.35),transparent 45%),
        radial-gradient(circle at 12% 82%,rgba(27,95,227,.4),transparent 42%),
        linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);
        background-size:auto,auto,46px 46px,46px 46px;pointer-events:none}
    .login-wrap{position:relative;z-index:1;display:grid;grid-template-columns:1.1fr 1fr;max-width:920px;width:100%;
        background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 30px 80px rgba(8,20,50,.5)}
    .login-side{background:linear-gradient(160deg,#0e3fa8,#1b5fe3);color:#fff;padding:48px 44px;display:flex;flex-direction:column;justify-content:space-between}
    .login-side .brand{display:flex;align-items:center;gap:12px;margin-bottom:36px}
    .login-side .brand .lg{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,#fff3,#fff1);border:1px solid #ffffff55;display:grid;place-items:center;font-size:24px;font-weight:800}
    .login-side .brand b{font-size:20px;font-weight:800;letter-spacing:.5px}
    .login-side .brand small{display:block;font-size:11px;color:#bcd3ff;letter-spacing:2px}
    .login-side h2{font-size:30px;font-weight:800;line-height:1.3;margin-bottom:16px}
    .login-side .feats{display:flex;flex-direction:column;gap:13px;margin-top:8px}
    .login-side .feats div{display:flex;align-items:center;gap:10px;font-size:14.5px;color:#dce8ff}
    .login-side .feats .d{width:24px;height:24px;border-radius:7px;background:#ffffff22;display:grid;place-items:center;font-size:13px}
    .login-side .copy{font-size:12px;color:#9fc1ff;margin-top:30px}
    .login-form{padding:52px 46px;display:flex;flex-direction:column;justify-content:center}
    .login-form h1{font-size:24px;font-weight:800;color:#0a1733}
    .login-form .sub{color:#5b6478;font-size:14px;margin:6px 0 28px}
    .login-form label{font-size:13px;font-weight:600;color:#1a2238;margin-bottom:7px;display:block}
    .login-form .inp{position:relative;margin-bottom:18px}
    .login-form .inp .ic{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#8b93a7;font-size:16px}
    .login-form input{width:100%;padding:13px 14px 13px 42px;border:1.5px solid #e8ecf4;border-radius:11px;outline:none;font-size:14.5px;transition:.18s}
    .login-form input:focus{border-color:#1b5fe3;box-shadow:0 0 0 3px rgba(27,95,227,.13)}
    .login-form .row{display:flex;align-items:center;justify-content:space-between;font-size:13px;color:#5b6478;margin-bottom:22px}
    .login-form .row a{color:#1b5fe3}
    .login-btn{width:100%;padding:14px;border-radius:11px;font-size:16px;font-weight:700;color:#fff;
        background:linear-gradient(135deg,#1b5fe3,#0e3fa8);box-shadow:0 10px 24px rgba(27,95,227,.35);transition:.18s}
    .login-btn:hover{transform:translateY(-1px);box-shadow:0 14px 30px rgba(27,95,227,.45)}
    .demo-tip{margin-top:18px;padding:12px 14px;background:#f5f8ff;border:1px dashed #c7d8f5;border-radius:10px;font-size:12.5px;color:#5b6478;line-height:1.7}
    .demo-tip b{color:#1b5fe3}
    .back{position:fixed;top:22px;left:24px;z-index:2;color:#fff;font-size:14px;opacity:.85;display:flex;align-items:center;gap:6px}
    .back:hover{opacity:1}
    @media(max-width:720px){.login-wrap{grid-template-columns:1fr}.login-side{display:none}.login-form{padding:40px 28px}}
</style>
</head>
<body>
    <a href="../index.html" class="back">‹ 返回官网</a>
    <div class="login-wrap">
        <div class="login-side">
            <div>
                <div class="brand">
                    <div class="lg">和</div>
                    <div><b>和易云</b><small>电力工程ERP</small></div>
                </div>
                <h2>让每一个工程项目<br>看得清、算得准、管得住</h2>
                <div class="feats">
                    <div><span class="d">📊</span>项目经营驾驶舱，盈亏实时可见</div>
                    <div><span class="d">📑</span>清单双价 + 材料双台账精细管控</div>
                    <div><span class="d">💰</span>成本资金 · 财务业财一体化</div>
                </div>
            </div>
            <div class="copy">© 2026 和易云电力工程ERP · 项目数字化经营管理平台</div>
        </div>
        <div class="login-form">
            <h1>欢迎登录</h1>
            <p class="sub">请输入您的账号信息进入管理系统</p>
            <form id="loginForm">
                <label>账号</label>
                <div class="inp"><span class="ic">👤</span><input type="text" id="username" value="admin" placeholder="用户名" autocomplete="username"></div>
                <label>密码</label>
                <div class="inp"><span class="ic">🔒</span><input type="password" id="password" value="123456" placeholder="密码" autocomplete="current-password"></div>
                <div class="row"><label style="margin:0;font-weight:500"><input type="checkbox" checked style="width:auto;padding:0;margin-right:6px;vertical-align:middle"> 记住我</label><a href="#">忘记密码？</a></div>
                <button type="submit" class="login-btn">登 录</button>
            </form>
            <div class="demo-tip">🔑 演示账号：用户名 <b>admin</b> ，密码 <b>123456</b>（演示版数据存储于本浏览器）</div>
        </div>
    </div>
<script>
    document.getElementById("loginForm").addEventListener("submit",function(e){
        e.preventDefault();
        const u=document.getElementById("username").value.trim();
        if(!u){ return; }
        localStorage.setItem("heyiyun_erp_user", JSON.stringify({name:u==="admin"?"管理员":u, role:"系统管理员", login:Date.now()}));
        location.href="index.html";
    });
</script>
</body>
</html>
