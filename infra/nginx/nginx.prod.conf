# 静态官网 + ERP 系统的统一 Nginx 反向代理配置

server {
    listen 80;
    server_name _;

    # 健康检查（供阿里云 SLB 使用）
    location /health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # ── 静态官网 ──────────────────────────────────────────
    # heyiyun-website 的构建产物挂载到 /usr/share/nginx/html/website
    # 路径：/  和  /erp/ (静态 ERP 登录引导页)
    location /erp/login.html {
        root /usr/share/nginx/html/website;
        try_files /erp/login.html =404;
    }

    location /erp/ {
        root /usr/share/nginx/html/website;
        index index.html;
        try_files $uri $uri/ /erp/index.html;
    }

    # ── ERP 应用 API ──────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # ── React SPA（ERP 前端）────────────────────────────
    # 匹配 /app/ 前缀的所有请求转到 React 应用
    location /app/ {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }

    # ── 官网根路径 ────────────────────────────────────────
    location / {
        root /usr/share/nginx/html/website;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
